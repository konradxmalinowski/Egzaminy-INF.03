<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Fotografia</title>
    <script src="skrypt.js" defer></script>
</head>

<body>
    <header>
        <h1>Fotografia artystyczna</h1>
    </header>

    <section class="zdjecia">
        <img src="1.jpg" alt="obrazy do sprzedaży" title="1.jpg">
        <img src="2.jpg" alt="obrazy do sprzedaży" title="2.jpg">
        <img src="3.jpg" alt="obrazy do sprzedaży" title="3.jpg">
        <img src="4.jpg" alt="obrazy do sprzedaży" title="4.jpg">
        <img src="5.jpg" alt="obrazy do sprzedaży" title="5.jpg">
        <img src="6.jpg" alt="obrazy do sprzedaży" title="6.jpg">
        <img src="7.jpg" alt="obrazy do sprzedaży" title="7.jpg">
        <img src="8.jpg" alt="obrazy do sprzedaży" title="8.jpg">
        <img src="9.jpg" alt="obrazy do sprzedaży" title="9.jpg">
        <img src="10.jpg" alt="obrazy do sprzedaży" title="10.jpg">
        <section class="clear-both"></section>
    </section>

    <main>
        <section class="lewa-sekcja">
            <h3>Zamówienie</h3>
            <label>Wybierz obraz: <input type="file" name="zdjecie" id="zdjecie" accept="image/jpeg"></label>
            <label>Liczba kopii: <input type="number" name="kopie" id="kopie"></label>
            <label><input type="radio" name="papier" id="papier-blyszczacy" checked>Papier błyszczący</label>
            <label><input type="radio" name="papier" id="papier-matowy">Papier matowy</label>
            <button id="dodaj-button">Dodaj do koszyka</button>
        </section>
        <nav>
            <ul>
                <li><a href="regulamin.html">Regulamin</a></li>
                <li><a href="uslugi.html">Usługi</a></li>
                <li><a href="https://pixabay.com">Zdjęcia</a></li>
            </ul>
        </nav>
        <section class="prawa-sekcja">
            <h3>Koszyk</h3>
            <div id="rezultat"></div>
        </section>
    </main>

    <footer>
        <p>Autor strony: <i>Konrad Malinowski</i></p>
    </footer>

</body>

</html>
